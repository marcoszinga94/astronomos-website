      // ── Bloque 5: Lumina ─────────────────────────────────────────────────
      // lumY = center de Lumina; top = cur, center = cur + lumR
      const lumX = cx;
      const lumY = cur + lumR;
      this._draw_lumina(ctx, lumX, lumY, lumR);
      cur = lumY + lumR + GAP_L;

      // ── Bloque 6: Botón JUGAR DE NUEVO ───────────────────────────────────
      const bw = Math.min(W * 0.80, 320);
      const btn1y = cur;
      const btn1x = cx - bw / 2;
      const bp=0.80+0.20*Math.sin(t*2.5);
      roundRect(ctx,btn1x,btn1y,bw,bh,bh*0.28);
      ctx.fillStyle=`rgba(${Math.round(60*bp)},${Math.round(110*bp)},${Math.round(240*bp)},0.93)`; ctx.fill();
      ctx.strokeStyle=C.GOLD; ctx.lineWidth=3;
      roundRect(ctx,btn1x,btn1y,bw,bh,bh*0.28); ctx.stroke();
      ctx.fillStyle=C.WHITE; ctx.font=`bold ${this._fs(0.042)}px 'Segoe UI',Arial,sans-serif`;
      ctx.textAlign='center'; ctx.fillText('JUGAR DE NUEVO', cx, btn1y+bh*0.63);
      this._finalBtn1={x:btn1x,y:btn1y,w:bw,h:bh};
      cur = btn1y + bh + GAP_S;

      // ── Bloque 7: Botón SALIR ────────────────────────────────────────────
      const btn2y = cur;
      roundRect(ctx,btn1x,btn2y,bw,btn2h,btn2h*0.28);
      ctx.fillStyle='rgba(80,22,22,0.9)'; ctx.fill();
      ctx.strokeStyle=C.RED; ctx.lineWidth=2.5;
      roundRect(ctx,btn1x,btn2y,bw,btn2h,btn2h*0.28); ctx.stroke();
      ctx.fillStyle=C.WHITE; ctx.font=`bold ${this._fs(0.038)}px 'Segoe UI',Arial,sans-serif`;
      ctx.fillText('SALIR', cx, btn2y+btn2h*0.63);
      this._finalBtn2={x:btn1x,y:btn2y,w:bw,h:btn2h};

    } else {
      // ── DESKTOP: layout vertical con cursor acumulativo y distribución
      // proporcional del espacio (simula justify-content: space-between
      // con pesos por sección, igual que el branch móvil).
      //
      // PROBLEMAS DEL LAYOUT ANTERIOR (porcentajes absolutos de H):
      //   1. Burbuja y Lumina se solapaban: burbuja calculada "encima" de
      //      lumY=H*0.60, pero bhB era suficientemente grande para invadir
      //      el área de Lumina → gap negativo de hasta 103px.
      //   2. Créditos solapaban con Btn2: créditos en H*0.940 y btn2 terminaba
      //      en H*0.95 → colisión garantizada en todas las resoluciones.
      //   3. Contenido comprimido en el 60% superior de la pantalla con el
      //      40% inferior prácticamente vacío.
      //
      // NUEVA ESTRATEGIA: cursor acumulativo + gaps proporcionales.
      //   - Se mide el contenido fijo total (títulos, panel, burbuja, Lumina,
      //     botones, créditos) y el espacio sobrante se distribuye como gaps
      //     con pesos distintos para cada transición.
      //   - El panel crece/decrece para absorber el espacio disponible
      //     (acotado entre 140px mínimo y 260px máximo).
      //   - Los créditos usan el cursor como todos los demás bloques,
      //     por lo que NUNCA pueden solapar con los botones.

      // ── Medidas constantes ───────────────────────────────────────────────
      const titleSz  = this._fs(0.085);
      const subSz    = this._fs(0.036);
      const fBub     = this._fs(0.030);
      const lumR     = Math.max(30, Math.min(W, H) * 0.060);
      const bh       = Math.max(52, H * 0.08);
      const btn2h    = Math.max(46, H * 0.07);
      const creditSz = this._fs(0.022);
      const pw       = Math.min(W * 0.54, 520);
      const bhBcola  = 2 * fBub * 1.5 + 18 + 10;  // burbuja + cola

      // ── Distribución proporcional del espacio ─────────────────────────────
      // 9 gaps con pesos relativos. Los pesos mayores corresponden a las
      // transiciones más importantes visualmente:
      //   panel→burbuja (1.8) y btn2→créditos (1.8): deben ser los más amplios
      //   Lumina→btn1 (1.2): separación media-grande
      //   entre botones (0.6): solo un pequeño espacio
      //
      //  Índice: [0]=top, [1]=tit→sub, [2]=sub→panel, [3]=panel→bub,
      //          [4]=bub→lum, [5]=lum→btn1, [6]=btn1→btn2,
      //          [7]=btn2→cr, [8]=cr→bottom
      const W_GAPS    = [0.8, 0.4, 0.8, 1.8, 0.8, 1.2, 0.6, 1.8, 0.8];
      const TOTAL_W   = W_GAPS.reduce((a, b) => a + b, 0); // 9.0
      const MIN_UNIT  = 9;  // mínimo 9px por unidad de peso → 81px mínimo total de gaps

      // Contenido fijo (todo excepto el panel y los gaps).
      // Los créditos ocupan: creditSz (línea 1) + creditSz*0.4 (espacio inter-línea)
      // + creditSz (línea 2) = creditSz * 2.4 total.
      // Incluirlos aquí garantiza que el panel y los gaps se calculen de forma
      // que el último elemento (crédito 2) NUNCA salga del viewport.
      const fixedNoPanel =
          titleSz + subSz + bhBcola + lumR * 2 + bh + btn2h + creditSz * 2.4;

      // Panel: ocupa lo que reste tras reservar contenido+gaps mínimos,
      // acotado entre 140px (legible mínimo) y 260px (máximo cómodo).
      // MIN_UNIT=5: cada unidad de peso vale al menos 5px (total mín. de gaps=45px),
      // suficiente para evitar que los bloques se toquen.
      const panelH = Math.max(140, Math.min(260, H - fixedNoPanel - TOTAL_W * 5));

      // Espacio disponible para los 9 gaps
      const availForGaps = Math.max(0, H - fixedNoPanel - panelH);
      const unit = availForGaps / TOTAL_W;
      const G = W_GAPS.map(w => unit * w);  // array de 9 gaps calculados

      // ── CURSOR: avanza de arriba a abajo sin retroceder ─────────────────
      let cur = G[0];  // margen superior

      // ── Bloque 1: Título ─────────────────────────────────────────────────
      cur += titleSz;
      ctx.font = `bold ${titleSz}px 'Segoe UI',Arial,sans-serif`;
      ctx.shadowColor='rgba(180,110,0,0.7)'; ctx.shadowBlur=18;
      ctx.fillStyle=`rgb(${Math.round(255*pulse)},${Math.round(210*pulse)},${Math.round(40*pulse)})`;
      ctx.fillText('FELICIDADES!', cx, cur);
      ctx.shadowBlur=0;
      cur += G[1];

      // ── Bloque 2: Subtítulo ──────────────────────────────────────────────
      cur += subSz;
      ctx.font=`${subSz}px 'Segoe UI',Arial,sans-serif`;
      ctx.fillStyle='rgba(190,215,255,0.9)';
      ctx.fillText('Exploraste todas las constelaciones del Cielo Cordobes!', cx, cur);
      cur += G[2];

      // ── Bloque 3: Panel de resultados ────────────────────────────────────
      const py = cur;
      const px = cx - pw / 2;
      const ph = panelH;
      const br2 = Math.min(pw, ph) * 0.05;
      roundRect(ctx, px, py, pw, ph, br2);
      ctx.fillStyle='rgba(6,10,50,0.96)'; ctx.fill();
      const brdC=`rgb(${Math.round(180+75*pulse)},${Math.round(150+65*pulse)},${Math.round(20*pulse)})`;
      ctx.strokeStyle=brdC; ctx.lineWidth=3;
      roundRect(ctx, px, py, pw, ph, br2); ctx.stroke();
      const stats=[
        ['Puntos Totales',     `${this.starsEarned}`, '#FFD700'],
        ['Constelaciones',     `${this.CONST.length}`, 'rgba(100,200,255,0.95)'],
        ['Nivel Explorador/a', this._getTitle(),       '#C896FF'],
      ];
      const rowH     = ph / stats.length;
      const labelSz  = this._fs(0.026);
      const valueSz  = this._fs(0.044);
      stats.forEach(([label, value, vc], i) => {
        const ry = py + i * rowH;
        if (i > 0) {
          ctx.strokeStyle='rgba(40,65,160,0.45)'; ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(px+pw*0.06,ry); ctx.lineTo(px+pw*0.94,ry); ctx.stroke();
        }
        ctx.textAlign='center';
        ctx.font=`${labelSz}px 'Segoe UI',Arial,sans-serif`;
        ctx.fillStyle='rgba(155,178,225,0.85)';
        ctx.fillText(label, cx, ry + rowH * 0.32);
        ctx.font=`bold ${valueSz}px 'Segoe UI',Arial,sans-serif`;
        ctx.fillStyle=vc;
        ctx.fillText(value, cx, ry + rowH * 0.74);
      });
      cur = py + ph + G[3];

      // ── Bloque 4: Burbuja de Lumina ──────────────────────────────────────
      // Va ENTRE el panel y Lumina (encima de Lumina, debajo del panel).
      // El cursor garantiza que byB > panelBot siempre.
      const bubLines = ['Excelente trabajo!', 'Descubriste todo!'];
      const bhB      = 2 * fBub * 1.5 + 18;
      const bwB      = Math.min(pw * 0.85, 320);
      const bxB      = cx - bwB / 2;
      const byB      = cur;
      const bubPulse = 0.55 + 0.45 * Math.sin(t * 1.8);
      roundRect(ctx, bxB, byB, bwB, bhB, 10);
      ctx.fillStyle='rgba(8,14,55,0.92)'; ctx.fill();
      const bubBorder=`rgb(${Math.round(80+120*bubPulse)},${Math.round(140+80*bubPulse)},255)`;
      ctx.strokeStyle=bubBorder; ctx.lineWidth=2;
      roundRect(ctx, bxB, byB, bwB, bhB, 10); ctx.stroke();
      // Cola apuntando hacia abajo (a Lumina)
      ctx.fillStyle='rgba(8,14,55,0.92)';
      ctx.beginPath();
      ctx.moveTo(cx-10, byB+bhB); ctx.lineTo(cx, byB+bhB+10); ctx.lineTo(cx+10, byB+bhB);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle=bubBorder; ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(cx-10, byB+bhB); ctx.lineTo(cx, byB+bhB+10); ctx.lineTo(cx+10, byB+bhB);
      ctx.stroke();
      ctx.textAlign='center';
      bubLines.forEach((ln, i) => {
        ctx.font=`${fBub}px 'Segoe UI',Arial,sans-serif`;
        ctx.fillStyle = i===0 ? 'rgba(255,240,80,0.97)' : 'rgba(210,225,255,0.95)';
        ctx.fillText(ln, cx, byB + 10 + fBub * (0.85 + i * 1.5));
      });
      cur = byB + bhB + 10 + G[4];  // +10 por la cola

      // ── Bloque 5: Lumina (con animación flotante) ─────────────────────────
      const lumX     = cx;
      const lumFloat = Math.sin(t * 1.2) * lumR * 0.08;  // oscilación suave ±8%
      const lumY     = cur + lumR + lumFloat;
      this._draw_lumina(ctx, lumX, lumY, lumR);
      cur = cur + lumR * 2 + G[5];

      // ── Bloque 6: Botón JUGAR DE NUEVO ───────────────────────────────────
      const bw     = Math.min(W * 0.36, 340);
      const btn1y  = cur;
      const btn1x  = cx - bw / 2;
      const bp     = 0.80 + 0.20 * Math.sin(t * 2.5);
      roundRect(ctx, btn1x, btn1y, bw, bh, bh*0.28);
      ctx.fillStyle=`rgba(${Math.round(60*bp)},${Math.round(110*bp)},${Math.round(240*bp)},0.93)`; ctx.fill();
      ctx.strokeStyle=C.GOLD; ctx.lineWidth=3;
      roundRect(ctx, btn1x, btn1y, bw, bh, bh*0.28); ctx.stroke();
      ctx.fillStyle=C.WHITE; ctx.font=`bold ${this._fs(0.036)}px 'Segoe UI',Arial,sans-serif`;
      ctx.textAlign='center'; ctx.fillText('JUGAR DE NUEVO', cx, btn1y+bh*0.62);
      this._finalBtn1={x:btn1x, y:btn1y, w:bw, h:bh};
      cur = btn1y + bh + G[6];

      // ── Bloque 7: Botón SALIR ────────────────────────────────────────────
      const btn2y = cur;
      roundRect(ctx, btn1x, btn2y, bw, btn2h, btn2h*0.28);
      ctx.fillStyle='rgba(80,22,22,0.9)'; ctx.fill();
      ctx.strokeStyle=C.RED; ctx.lineWidth=3;
      roundRect(ctx, btn1x, btn2y, bw, btn2h, btn2h*0.28); ctx.stroke();
      ctx.fillStyle=C.WHITE; ctx.font=`bold ${this._fs(0.032)}px 'Segoe UI',Arial,sans-serif`;
      ctx.fillText('SALIR', cx, btn2y+btn2h*0.62);
      this._finalBtn2={x:btn1x, y:btn2y, w:bw, h:btn2h};
      cur = btn2y + btn2h + G[7];

      // ── Bloque 8: Créditos ───────────────────────────────────────────────
      // Usan el cursor → imposible que solapen con Btn2 (siempre cur > btn2Bot).
      ctx.font=`${creditSz}px 'Segoe UI',Arial,sans-serif`;
      ctx.fillStyle='rgba(180,200,240,0.7)';
      cur += creditSz;
      ctx.fillText('Gracias por explorar El Cielo Cordobes', cx, cur);
      ctx.fillStyle='rgba(255,215,0,0.75)';
      ctx.fillText('Desarrollado por Aleida Appendino', cx, cur + creditSz * 1.4);
    }
  }

  _getTitle() {
    // Umbrales actualizados para 12 constelaciones (max ~860pts)
    if (this.starsEarned>=800) return 'Astronoma Suprema';
    if (this.starsEarned>=600) return 'Exploradora Galactica';
    if (this.starsEarned>=380) return 'Navegante Estelar';
    return 'Aprendiz del Cosmos';
  }
}

// ═══════════════════════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════════════════════
function rnd(a,b) { return a + Math.random()*(b-a); }

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function rectHit(sx, sy, r) {
  return r && sx>=r.x && sx<=r.x+r.w && sy>=r.y && sy<=r.y+r.h;
}

// ═══════════════════════════════════════════════════════
// INICIO
// ═══════════════════════════════════════════════════════
window.addEventListener('load', () => { window.GAME = new Game(); });
</script>
